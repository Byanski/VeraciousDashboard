<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veracious Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0b0e13;
      --bg2:         #10141c;
      --bg3:         #161c28;
      --border:      #1e2a3a;
      --border-hi:   #2e4060;
      --accent:      #00e5ff;
      --accent2:     #00b4cc;
      --accent-glow: rgba(0, 229, 255, 0.15);
      --text:        #c8d8e8;
      --text-dim:    #5a7090;
      --text-muted:  #3a5070;
      --online:      #00ff88;
      --offline:     #ff3860;
      --checking:    #ffcc00;
      --tag-bg:      rgba(0, 229, 255, 0.07);
      --tag-color:   #4db8cc;
      --radius:      6px;
      --font-mono:   'Share Tech Mono', monospace;
      --font-ui:     'Exo 2', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .scanline {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,229,255,0.04) 0%, transparent 100%);
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .logo-mark {
      font-size: 2.4rem;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,229,255,0.3);
      line-height: 1;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,229,255,0.3); }
      50%       { text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0,229,255,0.5); }
    }

    h1 {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 12px rgba(0,229,255,0.4);
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
      font-family: var(--font-mono);
    }

    .header-right { display: flex; align-items: center; gap: 24px; }
    .clock-block { text-align: right; }

    .clock {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      color: var(--text);
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .date {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .status-summary { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

    .pill {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.08em;
    }

    .pill-online  { background: rgba(0,255,136,0.1); color: var(--online);  border: 1px solid rgba(0,255,136,0.3); }
    .pill-offline { background: rgba(255,56,96,0.1);  color: var(--offline); border: 1px solid rgba(255,56,96,0.3); }

    main {
      position: relative;
      z-index: 1;
      padding: 36px 40px 60px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .group { margin-bottom: 48px; animation: fadeUp 0.4s ease both; }
    .group:nth-child(1) { animation-delay: 0.05s; }
    .group:nth-child(2) { animation-delay: 0.10s; }
    .group:nth-child(3) { animation-delay: 0.15s; }
    .group:nth-child(4) { animation-delay: 0.20s; }
    .group:nth-child(5) { animation-delay: 0.25s; }
    .group:nth-child(6) { animation-delay: 0.30s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .group-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .group-icon { font-size: 1.1rem; color: var(--accent); }

    .group-name {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 18px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
      cursor: pointer;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40px; height: 2px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s, width 0.3s;
    }

    .card:hover {
      background: var(--bg3);
      border-color: var(--border-hi);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
    }

    .card:hover::before { opacity: 1; width: 60px; }

    .card-header { display: flex; align-items: center; gap: 10px; }
    .card-icon { font-size: 1.3rem; flex-shrink: 0; line-height: 1; }

    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.02em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-muted);
      transition: background 0.3s;
      margin-left: auto;
    }

    .status-dot.online   { background: var(--online);   box-shadow: 0 0 6px var(--online);  animation: blink 3s ease-in-out infinite; }
    .status-dot.offline  { background: var(--offline);  box-shadow: 0 0 6px var(--offline); }
    .status-dot.checking { background: var(--checking); animation: glow-pulse 1s linear infinite; }

    @keyframes blink      { 0%,100%{opacity:1}50%{opacity:.5} }
    @keyframes glow-pulse { 0%{box-shadow:0 0 4px var(--checking)}50%{box-shadow:0 0 10px var(--checking)}100%{box-shadow:0 0 4px var(--checking)} }

    .card-desc { font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 2px 8px;
      background: var(--tag-bg);
      color: var(--tag-color);
      border-radius: 3px;
      border: 1px solid rgba(0,229,255,0.1);
      letter-spacing: 0.06em;
    }

    .card-stats {
      display: flex;
      gap: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .stat-item { display: flex; flex-direction: column; gap: 2px; min-width: 55px; }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--accent);
      line-height: 1;
      transition: color 0.3s;
    }

    .stat-value.updating { color: var(--accent2); }

    .stat-label {
      font-size: 0.62rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 16px;
      color: var(--text-muted);
      font-size: 0.7rem;
      font-family: var(--font-mono);
      border-top: 1px solid var(--border);
      letter-spacing: 0.06em;
    }

    footer code { color: var(--accent2); }

    @media (max-width: 700px) {
      header { flex-direction: column; align-items: flex-start; gap: 16px; padding: 20px 20px 16px; }
      .header-right { width: 100%; justify-content: space-between; }
      main { padding: 24px 20px 40px; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }

    /* ── HA Toggle button (lives inside the normal card) ─────── */

    .ha-toggle-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
      padding: 6px 10px;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.15);
      border-radius: 4px;
      color: var(--accent2);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      width: 100%;
      text-align: left;
    }

    .ha-toggle-btn:hover {
      background: rgba(0,229,255,0.12);
      border-color: rgba(0,229,255,0.35);
      color: var(--accent);
    }

    .ha-toggle-btn.open {
      background: rgba(0,229,255,0.12);
      border-color: rgba(0,229,255,0.4);
      color: var(--accent);
    }

    .ha-toggle-arrow {
      display: inline-block;
      transition: transform 0.25s;
      font-style: normal;
      margin-left: auto;
    }

    .ha-toggle-btn.open .ha-toggle-arrow { transform: rotate(180deg); }

    /* ── Backdrop ─────────────────────────────────────────────── */

    .ha-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      backdrop-filter: blur(2px);
      animation: fadeInBack 0.2s ease;
    }

    .ha-backdrop.open { display: block; }

    @keyframes fadeInBack {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Flyout Drawer ────────────────────────────────────────── */

    .ha-drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 420px;
      max-width: 92vw;
      background: var(--bg2);
      border-left: 1px solid var(--border-hi);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -8px 0 40px rgba(0,0,0,0.5), -1px 0 0 rgba(0,229,255,0.08);
    }

    .ha-drawer.open {
      transform: translateX(0);
    }

    /* Drawer header bar */
    .ha-drawer-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,229,255,0.04) 0%, transparent 100%);
      flex-shrink: 0;
    }

    .ha-drawer-icon { font-size: 1.2rem; }

    .ha-drawer-title {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      flex: 1;
    }

    .ha-drawer-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 1rem;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    .ha-drawer-close:hover {
      border-color: var(--border-hi);
      color: var(--text);
      background: var(--bg3);
    }

    /* Scrollable content area */
    .ha-drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) transparent;
    }

    .ha-drawer-body::-webkit-scrollbar { width: 4px; }
    .ha-drawer-body::-webkit-scrollbar-track { background: transparent; }
    .ha-drawer-body::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* Loading / error states */
    .ha-controls-loading {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      padding: 24px 0;
      text-align: center;
    }

    .ha-controls-error {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--offline);
      padding: 16px 0;
      text-align: center;
    }

    /* Domain section header */
    .ha-domain-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 20px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .ha-domain-heading:first-child { margin-top: 0; }

    .ha-domain-icon { font-size: 0.9rem; }

    .ha-domain-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .ha-domain-count {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-muted);
      margin-left: auto;
      opacity: 0.6;
    }

    /* Entity grid — two columns in the wide drawer */
    .ha-entity-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .ha-entity-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      font-family: var(--font-ui);
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: left;
      overflow: hidden;
    }

    .ha-entity-btn:hover {
      background: #1a2234;
      border-color: var(--border-hi);
      color: var(--text);
    }

    .ha-entity-btn.on {
      background: rgba(0,229,255,0.07);
      border-color: rgba(0,229,255,0.3);
      color: var(--accent);
      box-shadow: 0 0 10px rgba(0,229,255,0.08);
    }

    .ha-entity-btn.on:hover {
      background: rgba(0,229,255,0.12);
      border-color: rgba(0,229,255,0.5);
    }

    .ha-entity-btn.unavailable {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .ha-entity-btn.busy {
      opacity: 0.6;
      cursor: wait;
      pointer-events: none;
    }

    .ha-entity-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-muted);
      transition: background 0.2s, box-shadow 0.2s;
    }

    .ha-entity-btn.on .ha-entity-indicator {
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
    }

    .ha-entity-btn.unavailable .ha-entity-indicator { background: var(--offline); }

    .ha-entity-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.73rem;
    }

    .ha-entity-value {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-left: auto;
      flex-shrink: 0;
    }

    .ha-entity-btn.on .ha-entity-value { color: var(--accent2); }

    /* Drawer footer */
    .ha-drawer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ha-last-updated {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--text-muted);
    }

    .ha-refresh-btn {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--accent2);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.06em;
      padding: 4px 8px;
      border-radius: 3px;
      transition: color 0.2s, background 0.2s;
    }

    .ha-refresh-btn:hover {
      color: var(--accent);
      background: rgba(0,229,255,0.07);
    }

  </style>
</head>
<body>
  <div class="scanline"></div>

  <header>
    <div class="header-left">
      <div class="logo-mark">⬡</div>
      <div>
        <h1>VERACIOUS</h1>
        <p class="subtitle">Home Network Dashboard</p>
      </div>
    </div>
    <div class="header-right">
      <div class="clock-block">
        <div id="clock" class="clock">--:--:--</div>
        <div id="date"  class="date">---</div>
      </div>
      <div class="status-summary">
        <span class="pill pill-online"  id="summary-online">0 online</span>
        <span class="pill pill-offline" id="summary-offline" style="display:none">0 offline</span>
      </div>
    </div>
  </header>

  <!-- HA Controls Flyout -->
  <div class="ha-backdrop" id="ha-backdrop"></div>
  <div class="ha-drawer"   id="ha-drawer">
    <div class="ha-drawer-header">
      <span class="ha-drawer-icon">🏡</span>
      <span class="ha-drawer-title">Device Controls</span>
      <button class="ha-drawer-close" id="ha-drawer-close" title="Close">✕</button>
    </div>
    <div class="ha-drawer-body" id="ha-drawer-body"></div>
    <div class="ha-drawer-footer">
      <span class="ha-last-updated" id="ha-last-updated"></span>
      <button class="ha-refresh-btn" id="ha-refresh-btn">↻ Refresh</button>
    </div>
  </div>

  <main id="groups-container"></main>

  <footer>
    Edit <code>config.py</code> for backend stats &bull; Edit <code>index.html</code> to add services &bull;
    Fast stats every <span id="fast-interval">5</span>s &bull; Slow stats every <span id="slow-interval">60</span>s
  </footer>

  <script>
  /* ============================================================
     VERACIOUS DASHBOARD — CONFIG
     ============================================================
     STATS FIELDS explained:
       key        : key from /stats/fast or /stats/slow API response
       label      : text shown under the value
       endpoint   : 'fast' (updates every 5s) or 'slow' (every 60s)
       transform  : optional JS function to format the value
                    e.g.  "v => v + ' MB/s'"

     HOME ASSISTANT CONTROLS:
       Add  haControls: true  to any service entry to enable the
       inline device control panel. Also set haUrl and haToken.
  ============================================================ */
  const CONFIG = {

    // URL of the stats backend (change if running on a different machine)
    statsBase: 'http://localhost:8889',

    // How often to poll each endpoint (milliseconds)
    fastInterval:   5000,
    slowInterval:   60000,
    statusInterval: 60000,

    // ── Home Assistant Controls ──────────────────────────────
    // Set these to enable the inline device control panel on
    // any card that has  haControls: true
    haUrl:   'http://192.168.88.253:8123',
    haToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiIxNTJkMmU5YmU0YTA0YWQ5Yjc0ZDc5ODVkMjBlNjQyMCIsImlhdCI6MTc3NTQwODY3NiwiZXhwIjoyMDkwNzY4Njc2fQ.Gzpk2ooqahCpCvbiBAkniJBQQX-KPJw1a2Z8Ltf5Muw',

    // Which entity domains to show in the controls panel.
    // Remove any you don't want to appear.
    haDomainsConfig: [
      { domain: 'light',        label: 'Lights',      icon: '💡', showValue: false },
      { domain: 'switch',       label: 'Switches',     icon: '🔌', showValue: false },
      { domain: 'input_boolean',label: 'Toggles',      icon: '🔘', showValue: false },
      { domain: 'climate',      label: 'Climate',      icon: '🌡️', showValue: true  },
      { domain: 'media_player', label: 'Media',        icon: '📺', showValue: true  },
      { domain: 'fan',          label: 'Fans',         icon: '🌀', showValue: false },
      { domain: 'cover',        label: 'Covers',       icon: '🪟', showValue: false },
    ],

    groups: [

      /* ── Infrastructure ───────────────────────────────────── */
      {
        name: "Infrastructure",
        icon: "⬡",
        services: [
          {
            name:        "Pi-hole",
            url:         "http://192.168.88.244:8080",
            icon:        "🕳️",
            description: "DNS ad blocker",
            tags:        ["dns", "network"],
            checkUrl:    "http://192.168.88.244:8080",
            stats: [
              { key: "pihole_blocked", label: "Blocked",    endpoint: "slow" },
              { key: "pihole_percent", label: "Block rate", endpoint: "slow", transform: "v => v + '%'" },
              { key: "pihole_gravity", label: "Blocklist",  endpoint: "slow", transform: "v => (v/1000).toFixed(0)+'k'" },
            ],
          },
          {
            name:        "Router Admin",

  /* ============================================================
     APP — no need to edit below this line
  ============================================================ */

  // ── Clock ──────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.toLocaleTimeString("en-US", { hour12: false });
    document.getElementById("date").textContent =
      now.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  }
  setInterval(updateClock, 1000);
  updateClock();

  document.getElementById("fast-interval").textContent = CONFIG.fastInterval / 1000;
  document.getElementById("slow-interval").textContent = CONFIG.slowInterval / 1000;

  // ── Stat cache ─────────────────────────────────────────────
  const _statCache = { fast: {}, slow: {} };

  async function fetchStats(endpoint) {
    try {
      const res = await fetch(`${CONFIG.statsBase}/stats/${endpoint}`, {
        cache: 'no-store',
        signal: AbortSignal.timeout(4000)
      });
      if (!res.ok) return;
      const data = await res.json();
      _statCache[endpoint] = data;
      refreshStatDisplays(endpoint);
    } catch { /* stats backend unavailable */ }
  }

  // ── Stat display elements registry ─────────────────────────
  const _statRegistry = { fast: [], slow: [] };

  function registerStat(endpoint, key, valEl, transform) {
    _statRegistry[endpoint].push({ key, valEl, transform });
  }

  function refreshStatDisplays(endpoint) {
    const cache = _statCache[endpoint];
    for (const { key, valEl, transform } of _statRegistry[endpoint]) {
      const raw = cache[key];
      if (raw === undefined || raw === null) continue;
      let val = raw;
      if (transform) {
        try { val = new Function('v', `return (${transform})(v)`)(raw); } catch {}
      }
      if (valEl.textContent !== String(val)) {
        valEl.classList.add('updating');
        valEl.textContent = val;
        setTimeout(() => valEl.classList.remove('updating'), 300);
      }
    }
  }

  // ── Helpers ─────────────────────────────────────────────────
  function el(tag, cls, inner) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (inner !== undefined) e.innerHTML = inner;
    return e;
  }

  function friendlyName(entity_id) {
    return entity_id
      .split('.')[1]
      .replace(/_/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  // ── Status checking ─────────────────────────────────────────
  async function checkStatus(service, dot) {
    if (!service.checkUrl) { dot.style.display = "none"; return; }
    dot.className = "status-dot checking";
    try {
      await fetch(service.checkUrl, {
        mode: "no-cors", cache: "no-store",
        signal: AbortSignal.timeout(5000)
      });
      dot.className = "status-dot online";
      dot.title = "Online";
    } catch {
      dot.className = "status-dot offline";
      dot.title = "Unreachable";
    }
    updateSummary();
  }

  function updateSummary() {
    const online  = document.querySelectorAll(".status-dot.online").length;
    const offline = document.querySelectorAll(".status-dot.offline").length;
    document.getElementById("summary-online").textContent = `${online} online`;
    const offEl = document.getElementById("summary-offline");
    offEl.textContent   = `${offline} offline`;
    offEl.style.display = offline > 0 ? "" : "none";
  }

  // ── Home Assistant Controls ─────────────────────────────────

  const HA_HEADERS = {
    'Authorization': `Bearer ${CONFIG.haToken}`,
    'Content-Type': 'application/json',
  };

  const HA_TOGGLEABLE = new Set([
    'light', 'switch', 'input_boolean', 'fan', 'media_player', 'cover'
  ]);

  function haEntityValue(state) {
    const domain = state.entity_id.split('.')[0];
    if (domain === 'climate') {
      const temp   = state.attributes.current_temperature;
      const target = state.attributes.temperature;
      return temp != null ? `${temp}°` : (target != null ? `→${target}°` : state.state);
    }
    if (domain === 'media_player') {
      return state.state !== 'off' && state.state !== 'unavailable'
        ? (state.attributes.media_title || state.state) : '';
    }
    return '';
  }

  function haIsOn(state) {
    const s = state.state;
    return s === 'on' || s === 'playing' || s === 'paused' ||
           s === 'heat' || s === 'cool' || s === 'auto' || s === 'heat_cool';
  }

  async function haFetchStates() {
    const res = await fetch(`${CONFIG.haUrl}/api/states`, {
      headers: HA_HEADERS,
      signal: AbortSignal.timeout(6000)
    });
    if (!res.ok) throw new Error(`HA returned ${res.status}`);
    return res.json();
  }

  async function haToggleEntity(entityId) {
    await fetch(`${CONFIG.haUrl}/api/services/homeassistant/toggle`, {
      method: 'POST',
      headers: HA_HEADERS,
      body: JSON.stringify({ entity_id: entityId }),
      signal: AbortSignal.timeout(5000)
    });
  }

  // ── Drawer state ────────────────────────────────────────────
  const _drawer      = document.getElementById('ha-drawer');
  const _backdrop    = document.getElementById('ha-backdrop');
  const _drawerBody  = document.getElementById('ha-drawer-body');
  const _lastUpdated = document.getElementById('ha-last-updated');
  const _refreshBtn  = document.getElementById('ha-refresh-btn');
  const _closeBtn    = document.getElementById('ha-drawer-close');

  let _drawerOpen      = false;
  let _activeToggleBtn = null;

  function openDrawer(toggleBtn) {
    _drawerOpen = true;
    _activeToggleBtn = toggleBtn;
    _drawer.classList.add('open');
    _backdrop.classList.add('open');
    toggleBtn.classList.add('open');
    document.body.style.overflow = 'hidden';
    populateDrawer();
  }

  function closeDrawer() {
    _drawerOpen = false;
    _drawer.classList.remove('open');
    _backdrop.classList.remove('open');
    if (_activeToggleBtn) _activeToggleBtn.classList.remove('open');
    _activeToggleBtn = null;
    document.body.style.overflow = '';
  }

  _closeBtn.addEventListener('click', closeDrawer);
  _backdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && _drawerOpen) closeDrawer(); });

  function populateDrawer() {
    _drawerBody.innerHTML = '<div class="ha-controls-loading">⬡ Loading devices…</div>';

    haFetchStates().then(states => {
      _drawerBody.innerHTML = '';

      const domainMap = {};
      for (const domCfg of CONFIG.haDomainsConfig) {
        domainMap[domCfg.domain] = { cfg: domCfg, entities: [] };
      }

      for (const state of states) {
        const domain = state.entity_id.split('.')[0];
        if (domainMap[domain]) domainMap[domain].entities.push(state);
      }

      let anyRendered = false;

      for (const domCfg of CONFIG.haDomainsConfig) {
        const { entities } = domainMap[domCfg.domain];
        if (!entities.length) continue;
        anyRendered = true;

        entities.sort((a, b) => {
          if (haIsOn(a) !== haIsOn(b)) return haIsOn(a) ? -1 : 1;
          return (a.attributes.friendly_name || a.entity_id)
            .localeCompare(b.attributes.friendly_name || b.entity_id);
        });

        const heading = el('div', 'ha-domain-heading');
        heading.appendChild(el('span', 'ha-domain-icon', domCfg.icon));
        heading.appendChild(el('span', 'ha-domain-label', domCfg.label));
        heading.appendChild(el('span', 'ha-domain-count', `${entities.length}`));
        _drawerBody.appendChild(heading);

        const grid = el('div', 'ha-entity-grid');

        for (const state of entities) {
          const isOn          = haIsOn(state);
          const isUnavailable = state.state === 'unavailable' || state.state === 'unknown';
          const name          = state.attributes.friendly_name || friendlyName(state.entity_id);
          const value         = domCfg.showValue ? haEntityValue(state) : '';

          const btn = el('button', 'ha-entity-btn');
          if (isOn) btn.classList.add('on');
          if (isUnavailable) btn.classList.add('unavailable');

          btn.appendChild(el('span', 'ha-entity-indicator'));
          btn.appendChild(el('span', 'ha-entity-name', name));
          if (value) btn.appendChild(el('span', 'ha-entity-value', value));
          btn.title = `${name} — ${state.state}`;

          if (!isUnavailable) {
            btn.addEventListener('click', async () => {
              btn.classList.add('busy');
              try {
                await haToggleEntity(state.entity_id);
                const nowOn = !btn.classList.contains('on');
                btn.classList.toggle('on', nowOn);
                btn.classList.remove('busy');
                btn.title = `${name} — ${nowOn ? 'on' : 'off'}`;
                setTimeout(populateDrawer, 1500);
              } catch {
                btn.classList.remove('busy');
              }
            });
          }

          grid.appendChild(btn);
        }

        _drawerBody.appendChild(grid);
      }

      if (!anyRendered) {
        _drawerBody.innerHTML = '<div class="ha-controls-loading">No controllable devices found.</div>';
      }

      _lastUpdated.textContent = `Updated ${new Date().toLocaleTimeString('en-US', { hour12: false })}`;

    }).catch(err => {
      _drawerBody.innerHTML = `<div class="ha-controls-error">Could not reach Home Assistant:<br>${err.message}</div>`;
    });
  }

  _refreshBtn.addEventListener('click', populateDrawer);

  // ── Card builder ────────────────────────────────────────────
  function buildCard(service) {
    // Cards with HA controls need a wrapper div
    if (service.haControls) {
      return buildHACard(service);
    }

    const card = el("a", "card");
    card.href   = service.url;
    card.target = "_blank";
    card.rel    = "noopener noreferrer";

    const header = el("div", "card-header");
    const dot    = el("span", "status-dot");
    header.append(
      el("span", "card-icon", service.icon || "◈"),
      el("span", "card-name", service.name),
      dot
    );
    card.appendChild(header);

    if (service.description) card.appendChild(el("p", "card-desc", service.description));

    if (service.tags && service.tags.length) {
      const tagsRow = el("div", "card-tags");
      service.tags.forEach(t => tagsRow.appendChild(el("span", "tag", t)));
      card.appendChild(tagsRow);
    }

    if (service.stats && service.stats.length) {
      const statsRow = el("div", "card-stats");
      service.stats.forEach(stat => {
        const item  = el("div", "stat-item");
        const valEl = el("div", "stat-value", "…");
        const lblEl = el("div", "stat-label", stat.label);
        item.append(valEl, lblEl);
        statsRow.appendChild(item);
        registerStat(stat.endpoint, stat.key, valEl, stat.transform);
      });
      card.appendChild(statsRow);
    }

    checkStatus(service, dot);
    return { card, dot, service };
  }

  function buildHACard(service) {
    // HA card is a normal card with an extra toggle button at the bottom
    const card = el("div", "card");

    const header = el("div", "card-header");
    const dot    = el("span", "status-dot");

    const titleLink = el("a", "card-name", service.name);
    titleLink.href   = service.url;
    titleLink.target = "_blank";
    titleLink.rel    = "noopener noreferrer";
    titleLink.style.textDecoration = "none";
    titleLink.style.color = "inherit";

    header.append(
      el("span", "card-icon", service.icon || "🏡"),
      titleLink,
      dot
    );
    card.appendChild(header);

    if (service.description) card.appendChild(el("p", "card-desc", service.description));

    if (service.tags && service.tags.length) {
      const tagsRow = el("div", "card-tags");
      service.tags.forEach(t => tagsRow.appendChild(el("span", "tag", t)));
      card.appendChild(tagsRow);
    }

    if (service.stats && service.stats.length) {
      const statsRow = el("div", "card-stats");
      service.stats.forEach(stat => {
        const item  = el("div", "stat-item");
        const valEl = el("div", "stat-value", "…");
        const lblEl = el("div", "stat-label", stat.label);
        item.append(valEl, lblEl);
        statsRow.appendChild(item);
        registerStat(stat.endpoint, stat.key, valEl, stat.transform);
      });
      card.appendChild(statsRow);
    }

    // Toggle button — opens the drawer
    const toggleBtn = el("button", "ha-toggle-btn");
    toggleBtn.innerHTML = 'DEVICE CONTROLS <i class="ha-toggle-arrow">▸</i>';
    toggleBtn.addEventListener("click", (e) => {
      e.preventDefault();
      if (_drawerOpen && _activeToggleBtn === toggleBtn) {
        closeDrawer();
      } else {
        if (_drawerOpen) closeDrawer();
        openDrawer(toggleBtn);
      }
    });
    card.appendChild(toggleBtn);

    checkStatus(service, dot);
    return { card, dot, service };
  }

  // ── Render ──────────────────────────────────────────────────
  const allDots = [];
  const container = document.getElementById("groups-container");

  CONFIG.groups.forEach(group => {
    const section = el("section", "group");
    const heading = el("div", "group-heading");
    if (group.icon) heading.appendChild(el("span", "group-icon", group.icon));
    heading.appendChild(el("h2", "group-name", group.name));
    section.appendChild(heading);

    const grid = el("div", "card-grid");
    group.services.forEach(service => {
      const { card, dot } = buildCard(service);
      grid.appendChild(card);
      allDots.push({ dot, service });
    });

    section.appendChild(grid);
    container.appendChild(section);
  });

  // ── Polling ─────────────────────────────────────────────────
  fetchStats('fast');
  fetchStats('slow');
  setInterval(() => fetchStats('fast'), CONFIG.fastInterval);
  setInterval(() => fetchStats('slow'), CONFIG.slowInterval);
  setInterval(() => {
    allDots.forEach(({ dot, service }) => checkStatus(service, dot));
  }, CONFIG.statusInterval);

  </script>
